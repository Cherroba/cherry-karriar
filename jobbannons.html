<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Jobbannons - Cherry</title>
  <link rel="stylesheet" href="cherry-karriar.css">
  <style>
    .page-content {
      padding-top: 80px;
      min-height: 100vh;
      background:
        radial-gradient(ellipse at 30% 20%, rgba(255, 0, 89, 0.08), transparent 60%),
        radial-gradient(ellipse at 70% 80%, rgba(80, 0, 100, 0.2), transparent 60%),
        var(--cherry-bg);
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      color: var(--cherry-text-muted);
      font-size: 0.9rem;
      margin-bottom: 32px;
      transition: color var(--cherry-transition);
    }
    .back-link:hover { color: var(--cherry-pink); }
    .back-link::before { content: '\2190'; }

    .annons-wrapper {
      max-width: 860px;
      margin: 0 auto;
    }

    .annons-card {
      background: var(--cherry-card-bg);
      border: 1px solid var(--cherry-card-border);
      border-radius: var(--cherry-radius-lg);
      overflow: hidden;
      margin-bottom: 32px;
    }

    .annons-frame {
      width: 100%;
      min-height: 600px;
      border: none;
      display: block;
      background: #fff;
    }

    .apply-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 28px 40px;
      background: var(--cherry-card-bg);
      border: 1px solid var(--cherry-card-border);
      border-radius: var(--cherry-radius-lg);
      margin-bottom: 48px;
    }
    .apply-bar p {
      color: var(--cherry-text-muted);
      font-size: 1rem;
      margin: 0;
    }
    .btn-apply {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 14px 36px;
      background: var(--cherry-pink);
      color: #fff;
      font-size: 1rem;
      font-weight: 700;
      border-radius: 8px;
      text-decoration: none;
      white-space: nowrap;
      transition: background 0.3s ease, transform 0.3s ease;
    }
    .btn-apply:hover {
      background: #e6004f;
      transform: translateY(-2px);
    }
    .btn-apply::after { content: '\2192'; }

    @media (max-width: 600px) {
      .apply-bar {
        flex-direction: column;
        align-items: flex-start;
        padding: 24px;
      }
      .btn-apply { width: 100%; justify-content: center; }
    }
  </style>
</head>
<body>

  <!-- HEADER -->
  <header class="site-header">
    <div class="header-inner">
      <button class="hamburger-btn" id="hamburgerBtn" aria-label="Meny">
        <span></span><span></span><span></span>
      </button>
      <a href="cherry-karriar.html" class="header-logo">
        <img src="Cherry-Logo-Default-Alpha.svg" alt="Cherry">
      </a>
      <a href="https://cherry.se/kontakt" class="header-contact-btn">Kontakt</a>
    </div>
  </header>

  <nav class="mobile-nav" id="mobileNav">
    <a href="https://cherry.se">Hem</a>
    <a href="https://cherry.se/samarbeten">Samarbeten</a>
    <a href="https://cherry.se/events">Events</a>
    <a href="cherry-karriar.html" class="active">Karriär</a>
    <a href="https://cherry.se/support">Support</a>
    <a href="https://cherry.se/kontakt">Kontakt</a>
    <a href="https://cherry.se/om-cherry">Om Cherry</a>
    <a href="https://cherry.se/spelregler">Spelregler</a>
    <a href="https://cherry.se/spelomsorg">Spelomsorg</a>
  </nav>

  <main class="page-content">
    <div class="container" style="padding-top: 40px;">

      <a href="lediga-tjanster.html" class="back-link">Tillbaka till Lediga tjänster</a>

      <div class="annons-wrapper">

        <div class="annons-card">
          <iframe id="annonsFrame" class="annons-frame" src="" title="Jobbannons"></iframe>
        </div>

        <div class="apply-bar">
          <p>Redo att söka? Skicka in din ansökan direkt.</p>
          <a href="#" id="applyLink" class="btn-apply">Sök tjänsten</a>
        </div>

      </div>
    </div>
  </main>

  <!-- FOOTER -->
  <footer class="site-footer">
    <div class="container">
      <nav class="footer-nav">
        <a href="https://cherry.se">Hem</a>
        <a href="https://cherry.se/samarbeten">Samarbeten</a>
        <a href="https://cherry.se/events">Events</a>
        <a href="cherry-karriar.html">Karriär</a>
        <a href="https://cherry.se/support">Support</a>
        <a href="https://cherry.se/kontakt">Kontakt</a>
        <a href="https://cherry.se/om-cherry">Om Cherry</a>
        <a href="https://cherry.se/spelregler">Spelregler</a>
        <a href="https://cherry.se/spelomsorg">Spelomsorg</a>
      </nav>
      <div class="footer-logo">
        <img src="Cherry-Logo-Default-Alpha.svg" alt="Cherry">
      </div>
      <div class="footer-copyright">&copy; 2026 Cherry. All rights reserved.</div>
    </div>
  </footer>

  <script src="cherry-karriar.js"></script>
  <script>
    const params = new URLSearchParams(window.location.search);
    const adID = params.get('AdID') || '';

    // Load jokerpublish annons into iframe
    document.getElementById('annonsFrame').src =
      'https://jokerpublish.cherry.se/softadmin.aspx?id=4&AdID=' + adID;

    // "Sök tjänsten" goes to our styled application form
    document.getElementById('applyLink').href =
      'sok-tjanst.html?AdID=' + adID;

    // Auto-resize iframe to content height once loaded (same-origin only)
    document.getElementById('annonsFrame').addEventListener('load', function () {
      try {
        const h = this.contentWindow.document.body.scrollHeight;
        if (h > 200) this.style.minHeight = h + 'px';
      } catch (e) {
        // Cross-origin – use fixed min-height defined in CSS
      }
    });
  </script>
</body>
</html>
